name: Template Build
# Only trigger, when the build workflow succeeded
on:
  workflow_run:
    workflows: ["Template"]
    types:
      - completed

concurrency:
  group: ci-${{github.actor}}-${{github.head_ref || github.run_number}}-${{github.ref}}-windows
  cancel-in-progress: true

jobs:
  build-windows:
    runs-on: "windows-latest"
    name: ${{ matrix.name }}
    steps:
      - name: Check-out repository
        uses: actions/checkout@v2

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          architecture: 'x64'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install urllib3

      - name: Download Godot_export_templates.tpz
        env:
          INPUT_TOKEN: ${{ secrets.TOKEN }}
          INPUT_ARTIFACT_NAME: Godot_export_templates.tpz
          INPUT_RENAME: Godot_export_templates.tpz.zip
          INPUT_REPO: LinuxUserGD/gdscript-transpiler-bin
          INPUT_WAIT_SECONDS: 10
        shell: cmd
        run: |
          curl.exe -L --output main.py --url https://raw.githubusercontent.com/bettermarks/action-artifact-download/master/main.py
          python main.py
          "C:\Program Files\7-Zip\7z.exe" x Godot_export_templates.tpz.zip
          "C:\Program Files\7-Zip\7z.exe" x Godot_export_templates.tpz

      - name: Download Godot_win64.exe.zip
        env:
          INPUT_TOKEN: ${{ secrets.TOKEN }}
          INPUT_ARTIFACT_NAME: Godot_win64.exe.zip
          INPUT_RENAME: Godot_win64.exe.zip.zip
          INPUT_REPO: LinuxUserGD/gdscript-transpiler-bin
          INPUT_WAIT_SECONDS: 10
        shell: cmd
        run: |
          python main.py
          "C:\Program Files\7-Zip\7z.exe" x Godot_win64.exe.zip.zip
          "C:\Program Files\7-Zip\7z.exe" x Godot_win64.exe.zip

      - name: Download godot.zip
        env:
          INPUT_TOKEN: ${{ secrets.TOKEN }}
          INPUT_ARTIFACT_NAME: godot.zip
          INPUT_RENAME: godot.zip.zip
          INPUT_REPO: LinuxUserGD/gdscript-transpiler-bin
          INPUT_WAIT_SECONDS: 10
        shell: cmd
        run: |
          python main.py
          "C:\Program Files\7-Zip\7z.exe" x godot.zip.zip
          "C:\Program Files\7-Zip\7z.exe" x godot.zip

      - name: Setup
        shell: cmd
        run: |
          curl.exe -L --output mesa.7z --url https://github.com/pal1000/mesa-dist-win/releases/download/20.3.2/mesa3d-20.3.2-release-msvc.7z
          "C:\Program Files\7-Zip\7z.exe" x mesa.7z
          mklink opengl32.dll "x64\opengl32.dll"
          mklink libglapi.dll "x64\libglapi.dll"
          move .godot gdscript-transpiler-bin/
          move Godot_v4.0-beta1_win64.exe gdscript-transpiler-bin/godot.exe
          md %USERPROFILE%\AppData\Roaming\Godot\export_templates\4.0.beta1
          dir
          cd templates
          move version.txt %USERPROFILE%\AppData\Roaming\Godot\export_templates\4.0.beta1
          move web_release.zip %USERPROFILE%\AppData\Roaming\Godot\export_templates\4.0.beta1
          move web_debug.zip %USERPROFILE%\AppData\Roaming\Godot\export_templates\4.0.beta1
          move web_dlink_release.zip %USERPROFILE%\AppData\Roaming\Godot\export_templates\4.0.beta1
          move web_dlink_debug.zip %USERPROFILE%\AppData\Roaming\Godot\export_templates\4.0.beta1
          cd ..
          cd gdscript-transpiler-bin
          md dist
          curl.exe -L --output export_presets.cfg --url https://gist.githubusercontent.com/LinuxUserGD/73d8e030a44eb7f91bdeaea96a321f6d/raw/export_presets.cfg
          godot.exe -v --quit --headless --export "Web" dist/index.html

      - name: Upload Artifact
        uses: actions/upload-artifact@v2.2.3
        with:
          name: html5
          path: gdscript-transpiler-bin/dist
